<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - FaceMortgage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    h1 {
      color: #1e3a5f;
      font-size: 24px;
      margin-bottom: 12px;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .saved-leads {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }
    
    .saved-leads h2 {
      color: #374151;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .lead-count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f3f4f6;
      padding: 8px 16px;
      border-radius: 20px;
      color: #4b5563;
      font-size: 14px;
    }
    
    .sync-note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry – your data is saved and will sync when you're back online.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="saved-leads">
      <h2>Saved for Later</h2>
      <div class="lead-count" id="savedCount">
        📊 <span id="leadCount">0</span> leads pending sync
      </div>
      <p class="sync-note">
        These will automatically upload when connected
      </p>
    </div>
  </div>
  
  <script>
    // Check for cached leads
    if ('localStorage' in window) {
      try {
        const pendingLeads = JSON.parse(localStorage.getItem('pending_leads') || '[]');
        document.getElementById('leadCount').textContent = pendingLeads.length;
      } catch (e) {
        console.log('Could not read pending leads');
      }
    }
    
    // Auto-retry every 30 seconds
    setTimeout(() => {
      window.location.reload();
    }, 30000);
    
    // Listen for online event
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
