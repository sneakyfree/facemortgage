<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- House shape (roof + body) -->
  <!-- Roof -->
  <path d="M256 100 L400 200 L400 220 L256 130 L112 220 L112 200 Z" fill="url(#houseGradient)"/>
  <!-- House body -->
  <rect x="140" y="200" width="232" height="180" rx="12" fill="url(#houseGradient)"/>

  <!-- Video/face circle (representing video call) -->
  <circle cx="256" cy="280" r="60" fill="#2563eb"/>

  <!-- Play/call indicator inside circle -->
  <circle cx="256" cy="280" r="48" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Simplified person silhouette (head + shoulders) -->
  <circle cx="256" cy="265" r="18" fill="#ffffff"/>
  <path d="M230 305 Q256 290 282 305 L282 315 Q256 305 230 315 Z" fill="#ffffff"/>

  <!-- Signal waves (representing live connection) -->
  <path d="M330 240 Q345 255 330 270" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
  <path d="M345 230 Q370 255 345 280" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>

  <!-- Door at bottom -->
  <rect x="235" y="340" width="42" height="40" rx="4" fill="#2563eb"/>
</svg>
